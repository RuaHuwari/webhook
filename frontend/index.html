<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Webhook UI</title>
  <style>
    body{font-family:Arial;margin:40px}
    .hidden{display:none}
    button{margin:5px;padding:8px 12px}
    input,select{margin:5px;padding:6px}
  </style>
</head>
<body>

<h2 id="title">Sign In</h2>

<div id="auth">
  <input id="email" placeholder="email" />
  <input id="password" type="password" placeholder="password" />
  <br/>
  <button onclick="signup()">Sign Up</button>
  <button onclick="signin()">Sign In</button>
</div>

<div id="dashboard" class="hidden">
  <h3>Dashboard</h3>
  <div id="adminButtons" class="hidden">
    <button onclick="chooseStatus()">See Full Job History</button>
    <!-- <button onclick="showPipelineForm()">Create Pipeline</button> -->
    <button onclick="">Show all Pipeline</button>
    <button onclick="">Show deliveries history</button>
  </div>

  <div id="userButtons" class="hidden">
    <button onclick="chooseStatus()">Get Job History</button>
    <button onclick="showPipelineForm()">Create Pipeline</button>
    <button onclick="">Show My Pipeline</button>
    <button onclick="">Show My deliveries history</button>
  </div>
</div>

<div id="statusChooser" class="hidden">
  <h4>Choose Status</h4>
  <select id="status">
    <option value="all">All</option>
    <option value="pending">Pending</option>
    <option value="success">Success</option>
    <option value="failed">Failed</option>
  </select>
  <button onclick="fetchHistory()">Fetch</button>
</div>

<div id="pipelineForm" class="hidden">
  <h4>Create Pipeline</h4>
  <input id="pipelineName" placeholder="Pipeline name" />
  <input id="subscribers" placeholder="Subscriber links (comma separated)" />
  <input id="actions" placeholder="Action IDs (comma separated)" />
  <button onclick="createPipeline()">Submit</button>
</div>

<pre id="result"></pre>

<script>

const API = "http://localhost:3030";
let userRole = null;

function setToken(token){
  localStorage.setItem("token", token);
}

function getToken(){
  return localStorage.getItem("token");
}

async function signup(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  const res=await fetch(API+"/auth/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,password})
  });

  const data=await res.json();
  document.getElementById("result").textContent=JSON.stringify(data,null,2);
}

async function signin(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  const res=await fetch(API+"/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,password})
  });

  const data=await res.json();

  setToken(data.token);
  userRole = data.role;

  document.getElementById("auth").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  if(data.role === "admin"){
    document.getElementById("adminButtons").classList.remove("hidden");
  }else{
    document.getElementById("userButtons").classList.remove("hidden");
  }
}

function chooseStatus(){
  document.getElementById("statusChooser").classList.remove("hidden");
}

async function fetchHistory(){

  const status=document.getElementById("status").value;
  let url="";

  if(userRole === "admin"){
    if(status === "all"){
      url = API + "/jobs/all";
    }else{
      url = API + "/jobs/all?status=" + status;
    }
  }else{
    if(status === "all"){
      url = API + "/jobs/myjobs";
    }else{
      url = API + "/jobs/myjobs?status=" + status;
    }
  }

  const res=await fetch(url,{
    headers:{
      Authorization:"Bearer "+getToken()
    }
  });

  const data=await res.json();
  document.getElementById("result").textContent=JSON.stringify(data,null,2);
}

function showPipelineForm(){
  document.getElementById("pipelineForm").classList.remove("hidden");
}

async function createPipeline(){

  const name=document.getElementById("pipelineName").value;
  const subscribers=document.getElementById("subscribers").value.split(",");
  const actions=document.getElementById("actions").value.split(",");

  const res=await fetch(API+"/pipelines",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+getToken()
    },
    body:JSON.stringify({
      name: name,
      subscribers:subscribers,
      actions:actions
    })
  });

  const data=await res.json();
  document.getElementById("result").textContent=JSON.stringify(data,null,2);
}

</script>

</body>
</html>
